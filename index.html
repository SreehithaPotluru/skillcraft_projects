<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Stopwatch</h1>
    <div class="stopwatch" id="display">00:00:00</div>
    <div class="buttons">
      <button id="start" class="btn start">Start</button>
      <button id="pause" class="btn pause">Pause</button>
      <button id="reset" class="btn reset">Reset</button>
      <button id="lap" class="btn lap">Lap</button>
    </div>
    <ul class="lap-times" id="laps"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
